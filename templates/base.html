<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}NoteShelf{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

<nav class="bg-white shadow">
  <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between">
    <a href="/" class="font-bold text-blue-600 text-xl">NoteShelf</a>
    <div class="space-x-4">
      <a href="/subjects">Subjects</a>
      {% if session.get('user_id') %}
        <a href="/logout" class="text-red-600">Logout</a>
      {% else %}
        <a href="/login">Login</a>
        <a href="/register">Register</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="flex-grow">
  {% block content %}{% endblock %}
</div>

<footer class="bg-white text-center p-4 text-sm">
  © 2026 NoteShelf
</footer>

</body>
</html>
