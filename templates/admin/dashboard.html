<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6">

<div class="max-w-5xl mx-auto bg-white p-6 rounded shadow">

<h2 class="text-2xl font-bold mb-6">Admin Dashboard</h2>

<!-- ADD SUBJECT -->
<h3 class="text-xl font-semibold mb-2">Add Subject</h3>
<form method="POST" action="/admin/add-subject" class="mb-6 space-x-2">
  <input name="name" placeholder="Subject name" required class="border p-2">
  <input name="description" placeholder="Description" class="border p-2">
  <button class="bg-blue-600 text-white px-4 py-2 rounded">Add</button>
</form>

<!-- UPLOAD PDF -->
<h3 class="text-xl font-semibold mb-2">Upload PDF</h3>
<form method="POST" action="/admin/upload-pdf" enctype="multipart/form-data" class="mb-6 space-x-2">
  <input name="title" placeholder="PDF Title" required class="border p-2">
  <select name="subject" class="border p-2">
    {% for s in subjects %}
      <option value="{{ s[0] }}">{{ s[1] }}</option>
    {% endfor %}
  </select>
  <input type="file" name="pdf" required>
  <button class="bg-green-600 text-white px-4 py-2 rounded">Upload</button>
</form>

<!-- LIST PDFS -->
<h3 class="text-xl font-semibold mb-2">All PDFs</h3>
<table class="w-full border mb-6">
<tr class="bg-gray-200">
  <th class="p-2 border">Title</th>
  <th class="p-2 border">Subject</th>
  <th class="p-2 border">Downloads</th>
  <th class="p-2 border">Action</th>
</tr>

{% for p in pdfs %}
<tr>
  <td class="p-2 border">{{ p[1] }}</td>
  <td class="p-2 border">{{ p[3] }}</td>
  <td class="p-2 border">{{ p[2] }}</td>
  <td class="p-2 border">
    <a href="/admin/update-pdf/{{ p[0] }}" class="text-blue-600 mr-2">Update</a>
    <a href="/admin/delete-pdf/{{ p[0] }}"
       class="text-red-600"
       onclick="return confirm('Delete this PDF?')">
       Delete
    </a>
  </td>
</tr>
{% endfor %}
</table>

<!-- SUBJECT LIST -->
<h3 class="text-xl font-semibold mb-2">Subjects</h3>
<ul class="mb-6">
{% for s in subjects %}
  <li class="mb-1">
    {{ s[1] }}
    <a href="/admin/edit-subject/{{ s[0] }}" class="text-blue-600 ml-2">Edit</a>
    <a href="/admin/delete-subject/{{ s[0] }}"
       class="text-red-600 ml-2"
       onclick="return confirm('Delete subject and all PDFs?')">
       Delete
    </a>
  </li>
{% endfor %}
</ul>

<a href="/admin/logout" class="text-red-600 font-semibold">Logout</a>

</div>
</body>
</html>
