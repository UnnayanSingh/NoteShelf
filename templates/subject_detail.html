{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto p-6">
  <h2 class="text-2xl font-bold mb-4">Available PDFs</h2>

  {% for p in pdfs %}
  <div class="bg-white p-4 shadow rounded mb-3 flex justify-between">
    <div>
      <h4 class="font-semibold">{{ p[2] }}</h4>
      <span class="text-green-600 font-bold">FREE</span>
    </div>
    <a href="/download-pdf/{{ p[0] }}"
       class="bg-blue-600 text-white px-4 py-2 rounded">
       Download
    </a>
  </div>
  {% endfor %}
</div>
{% endblock %}
