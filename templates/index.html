<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NoteShelf</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

    <!-- Navbar -->
    <nav class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">NoteShelf</h1>
            <div class="space-x-4">
                <a href="/login" class="text-gray-700 hover:text-blue-600">Login</a>
                <a href="/register" class="text-gray-700 hover:text-blue-600">Register</a>
                <a href="/subjects" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Browse Notes
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="flex items-center justify-center h-[80vh]">
        <div class="bg-white p-10 rounded-lg shadow-lg text-center w-full max-w-xl">
            <h2 class="text-4xl font-bold mb-4">Premium Study Notes</h2>
            <p class="text-gray-600 mb-6">
                Subject-wise PDFs curated for exams & concepts.
            </p>
            <a href="/subjects"
               class="bg-blue-600 text-white px-6 py-3 rounded text-lg hover:bg-blue-700">
                Explore Subjects
            </a>
        </div>
    </section>

</body>
</html>
